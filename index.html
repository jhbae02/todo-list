<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 로그인/회원가입 화면 -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">TODO List</h1>
        <p class="auth-subtitle">할 일을 정리하려면 로그인하세요</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-mode="login">로그인</button>
        <button class="auth-tab" data-mode="signup">회원가입</button>
      </div>
      <form id="auth-form" class="auth-form">
        <input type="email" id="auth-email" class="auth-input" placeholder="이메일" required autocomplete="email">
        <input type="password" id="auth-password" class="auth-input" placeholder="비밀번호 (6자 이상)" required minlength="6" autocomplete="current-password">
        <button type="submit" id="auth-submit" class="auth-submit-btn">로그인</button>
      </form>
      <p id="auth-message" class="auth-message"></p>
    </div>
  </div>

  <div id="app-container" class="container" style="display:none;">
    <div class="header">
      <div class="header-top">
        <div class="header-text">
          <h1 class="title">TODO List</h1>
          <p class="subtitle">오늘 할 일을 정리해보세요~~</p>
          <div id="header-user" class="header-user" style="display:none;">
            <span id="user-email" class="user-email"></span>
            <button id="logout-btn" class="logout-btn">로그아웃</button>
          </div>
        </div>
        <div class="header-right">
          <button id="theme-toggle" class="theme-toggle" title="다크 모드 전환">🌙 다크</button>
        <svg class="header-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- 클립보드 몸체 -->
          <rect x="8" y="10" width="40" height="42" rx="7" fill="rgba(255,255,255,0.15)"/>
          <rect x="8" y="10" width="40" height="42" rx="7" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
          <!-- 클립 -->
          <rect x="20" y="5" width="16" height="10" rx="5" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
          <!-- 체크된 항목 1 -->
          <circle cx="19" cy="26" r="4" fill="rgba(255,255,255,0.9)"/>
          <path d="M17 26l1.5 1.5 3-3" stroke="#1a3678" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="26" y="24" width="14" height="2.5" rx="1.25" fill="rgba(255,255,255,0.7)"/>
          <!-- 체크된 항목 2 -->
          <circle cx="19" cy="35" r="4" fill="rgba(255,255,255,0.9)"/>
          <path d="M17 35l1.5 1.5 3-3" stroke="#1a3678" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="26" y="33" width="10" height="2.5" rx="1.25" fill="rgba(255,255,255,0.7)"/>
          <!-- 미완료 항목 -->
          <circle cx="19" cy="44" r="4" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
          <rect x="26" y="42" width="16" height="2.5" rx="1.25" fill="rgba(255,255,255,0.4)"/>
          <!-- 반짝이 별 -->
          <circle cx="46" cy="8" r="2" fill="rgba(255,255,255,0.8)"/>
          <circle cx="50" cy="14" r="1.2" fill="rgba(255,255,255,0.5)"/>
          <circle cx="42" cy="13" r="1" fill="rgba(255,255,255,0.4)"/>
        </svg>
        </div>
      </div>
    </div>

    <div class="group-manager">
      <button id="group-manager-toggle" class="group-manager-toggle">
        그룹 관리 <span id="group-manager-icon">▾</span>
      </button>
      <div id="group-manager-body" class="group-manager-body" style="display:none;">
        <div class="group-add-row">
          <input type="text" id="group-input" class="group-input" placeholder="그룹 이름을 입력하세요">
          <button id="group-add-btn" class="group-add-btn">추가</button>
        </div>
        <div id="group-chips" class="group-chips">
          <span class="no-groups-hint">아직 그룹이 없습니다</span>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="todo-input" class="todo-input" placeholder="할 일을 입력하세요">
        <button id="add-btn" class="add-btn">추가</button>
      </div>
      <div class="input-meta-row">
        <button id="desc-toggle-btn" class="desc-toggle-btn">＋ 설명 추가</button>
        <select id="todo-group-select" class="todo-group-select">
          <option value="">그룹 없음</option>
        </select>
        <select id="todo-priority" class="todo-priority-select">
          <option value="">우선순위</option>
          <option value="high">🔴 높음</option>
          <option value="normal">🟡 보통</option>
          <option value="low">🔵 낮음</option>
        </select>
      </div>
      <textarea id="todo-desc-input" class="todo-desc-input" placeholder="설명을 입력하세요 (선택사항)" style="display:none;"></textarea>
    </div>

    <div id="group-filter-row" class="group-filter-row" style="display:none;"></div>

    <div class="tabs">
      <button class="tab active" data-filter="all">전체 <span class="tab-count" id="count-all">0</span></button>
      <button class="tab" data-filter="active">진행 중 <span class="tab-count" id="count-active">0</span></button>
      <button class="tab" data-filter="completed">완료 <span class="tab-count" id="count-completed">0</span></button>
    </div>

    <div class="search-bar">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="search-input" class="search-input" placeholder="키워드로 검색…">
      <button id="search-clear-btn" class="search-clear-btn" style="display:none;">×</button>
    </div>

    <div id="select-all-bar" class="select-all-bar" style="display:none;">
      <label class="select-all-label">
        <input type="checkbox" id="select-all-checkbox">
        <span>진행 중 전체 선택</span>
      </label>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <div class="footer">
      <span id="remaining-count" class="remaining-count">0개 남음</span>
      <button id="clear-completed-btn" class="clear-btn">완료 항목 삭제</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
